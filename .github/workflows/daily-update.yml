name: 🤖 AI-Daily Auto Update

on:
  schedule:
    # Runs at 00:00 UTC daily; random delay is applied inside the job
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_updates:
        description: 'Force N updates (0-8). Leave empty for random (0-8).'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: ⏰ Random delay (spread effective run time across the day)
        run: |
          DELAY=$((RANDOM % 3600))
          echo "Sleeping ${DELAY}s to vary the daily run time..."
          sleep $DELAY

      - name: 🔧 Configure git identity
        run: |
          git config --local user.email "${{ vars.GIT_EMAIL || 'github-actions[bot]@users.noreply.github.com' }}"
          git config --local user.name  "${{ vars.GIT_NAME  || 'AI-Daily Bot' }}"

      - name: 🚀 Run daily update (commits individually per update)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_UPDATES:  ${{ github.event.inputs.force_updates }}
          GITHUB_ACTOR:   ${{ github.actor }}
          # Pass today's date as seed base so the script is reproducible
          RUN_DATE: ${{ github.run_id }}
        run: |
          python scripts/daily_update.py

      - name: 📤 Push all commits
        run: |
          git push origin HEAD:${{ github.ref_name || 'main' }}

      - name: 📊 Write job summary
        if: always()
        run: |
          if [ -f ".run_summary.md" ]; then
            echo "### 🤖 AI-Daily Run Summary" >> $GITHUB_STEP_SUMMARY
            cat .run_summary.md              >> $GITHUB_STEP_SUMMARY
          fi
          # Clean up temp files (they are in .gitignore, but tidy up anyway)
          rm -f .run_summary.md
